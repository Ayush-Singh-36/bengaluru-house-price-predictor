version: '3.8'

services:
  # The FastAPI Backend Service
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    restart: always

  # The Streamlit Frontend Service
  frontend-app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    depends_on:
      - backend-api
    restart: always
    